; LawnBot CrowPanel ESP32 Display — PlatformIO Project
; Board: ELECROW DIS08070H (ESP32-S3-WROOM-1-N4R8, 800x480 RGB LCD, GT911 touch)

[platformio]
src_dir    = src
boards_dir = .

[env:crowpanel-7inch]
; espressif32@5.4.0 bundles arduino-esp32@2.0.14 — no git clone, no sdkconfig.h path issues
platform         = espressif32@5.4.0
board            = esp32-s3-devkitc-1-n8-elecrow
framework        = arduino

build_flags =
    -I include
    -D LV_CONF_INCLUDE_SIMPLE          ; LVGL finds include/lv_conf.h via -I include
    -D CORE_DEBUG_LEVEL=1
    -D ARDUINO_USB_MODE=1              ; ESP32-S3 native USB CDC
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM

board_build.partitions = partitions.csv

lib_deps =
    lvgl/lvgl                @ ^8.4.0
    lovyan03/LovyanGFX       @ ^1.1.16
    tamctec/TAMC_GT911       @ ^1.0.2
    links2004/WebSockets     @ ^2.4.1
    bblanchon/ArduinoJson    @ ^7.0.4

monitor_speed  = 115200
monitor_filter = esp32_exception_decoder
upload_speed   = 921600
